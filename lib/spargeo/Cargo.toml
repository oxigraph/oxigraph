[package]
name = "spargeo"
version = "0.5.4"
authors.workspace = true
license.workspace = true
readme = "README.md"
keywords = ["GeoSPARQL"]
repository = "https://github.com/oxigraph/oxigraph/tree/main/lib/spargeo"
documentation = "https://docs.rs/spargeo"
description = "GeoSPARQL functions"
edition.workspace = true
rust-version.workspace = true

[features]
default = []
bridge = ["dep:geo"]
spatial_index = ["dep:s2", "dep:geo"]

[dependencies]
geo = { workspace = true, optional = true }
oxrdf.workspace = true
s2 = { workspace = true, optional = true }
spareval = { workspace = true, features = ["geosparql"] }

[lints]
workspace = true

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
