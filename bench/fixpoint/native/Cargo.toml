[package]
name = "fixpoint-bench-oxigraph"
version = "0.0.0"
edition = "2024"
publish = false
description = "Rust harness that times the standard SPARQL evaluator and the DataFusion SPARQL evaluator on the subclass closure workload."

[[bin]]
name = "fixpoint_bench_oxigraph"
path = "src/main.rs"

[dependencies]
oxigraph = { path = "../../../lib/oxigraph", features = ["datafusion"] }
oxrdf = { path = "../../../lib/oxrdf" }

[profile.release]
lto = "thin"
codegen-units = 1

# Standalone so the outer workspace does not pick this up on plain cargo
# invocations. Reasonable lives in a separate binary (sibling directory
# native_reasonable/) because its old oxigraph 0.3.5 dep collides with the
# workspace's local oxrocksdb-sys.
[workspace]
