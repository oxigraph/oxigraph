version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
  - package-ecosystem: "pip"
    directory: "/python/"
    versioning-strategy: increase-if-necessary
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
  - package-ecosystem: "npm"
    directory: "/js/"
    versioning-strategy: increase-if-necessary
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
